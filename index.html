<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Absensi Wajah Pintar</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        background-color: #f4f6f9;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      header {
        text-align: center;
        margin-bottom: 20px;
      }
      header h1 {
        color: #333;
        font-size: 24px;
      }
      header p {
        color: #666;
      }
      .container {
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 640px;
        text-align: center;
      }
      .camera-area {
        position: relative;
        width: 100%;
        max-width: 600px;
        height: 450px;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        margin: 0 auto 20px auto;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none; /* Agar tidak mengganggu klik pada area kamera */
      }
      .status-box {
        padding: 12px;
        background: #e1f5fe;
        color: #0288d1;
        border-radius: 6px;
        font-weight: bold;
        margin-bottom: 15px;
        transition: all 0.3s ease;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }
      .btn-primary {
        background: #4e73df;
        color: white;
      }
      .btn-primary:hover {
        background: #2e59d9;
      }
      .btn-success {
        background: #1cc88a;
        color: white;
      }
      .btn-success:hover {
        background: #17a673;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Sistem Absensi Face Recognition</h1>
      <p>Proyek Akhir Pemrograman Web</p>
    </header>

    <div class="container">
      <div class="status-box" id="status-label">
        Menghubungkan kamera dan memuat AI model...
      </div>

      <div class="camera-area">
        <video id="webcam" autoplay muted playsinline></video>
      </div>

      <div class="btn-group">
        <button class="btn-primary" onclick="mulaiAbsen()">Ambil Absen</button>
        <a href="registrasi.html"><button class="btn-success">Daftar Wajah Baru</button></a>
        <a href="dashboard.php"><button style="background: #858796; color: white;">Lihat Rekap Absen</button></a>
    </div>

<script src="script.js"></script>
</body>
</html>
